{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}CuraFlow{% endblock %} — CuraFlow</title>
  <meta name="description" content="CuraFlow — AI-assisted wellness program man">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Styles -->
{% block css %}
    <link href="{% static 'vendor/bootstrap5.3/css/bootstrap.min.css' %}" rel="stylesheet"  />
    <link rel="stylesheet" href="{% static 'css/styles.css' %}" />
{% endblock css %}

  {% block extra_head %}{% endblock %}
</head>
<body>

<div class="app-shell">

  <!-- Sidebar -->
  {% include "partials/sidebar.html" %}

  <!-- Mobile overlay -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- Main content -->
  <div class="main-content" id="mainContent">

    <!-- Top header -->
    {% include "partials/header.html" %}

    <!-- Page content -->
    <main class="page-content {% block content_class %}{% endblock %}">
      {% block content %}{% endblock %}
    </main>

  </div><!-- /main-content -->

</div><!-- /app-shell -->

<script src="{% static 'vendor/bootstrap5.3/js/bootstrap.bundle.min.js' %}"></script>
<script src="{% static 'vendor/popper/popper.min.js' %}"></script>
<script src="{% static 'vendor/bootstrap5.3/js/bootstrap.min.js' %}"></script>

<script src="{% static 'js/app.js' %}"></script>

{% block extra_scripts %}{% endblock %}
</body>
</html>
