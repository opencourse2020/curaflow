{# templates/partials/stat_card.html #}
{# Variables: label, value, trend, trend_dir (up/down/flat), period, icon_color, accent_color #}
<div class="stat-card">
  <div class="stat-card-accent {{ accent_color|default:'teal' }}"></div>
  <div class="stat-card-header">
    <span class="stat-card-label">{{ label }}</span>
    <div class="stat-card-icon {{ icon_color|default:'teal' }}">
      {% block stat_icon %}
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 013 19.875v-6.75z" />
      </svg>
      {% endblock %}
    </div>
  </div>
  <div class="stat-value">{{ value }}</div>
  <div>
    <span class="stat-trend {{ trend_dir|default:'up' }}">
      {% if trend_dir == 'up' %}
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 10.5L12 3m0 0l7.5 7.5M12 3v18"/></svg>
      {% else %}
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 13.5L12 21m0 0l-7.5-7.5M12 21V3"/></svg>
      {% endif %}
      {{ trend }}
    </span>
    <span class="stat-period">{{ period|default:"vs last month" }}</span>
  </div>
</div>
