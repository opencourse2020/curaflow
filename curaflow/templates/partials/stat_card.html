
<div class="stat-card">

  <!-- Colored accent bar -->
  <div class="stat-card-accent {{ accent_color|default:'teal' }}"></div>

  <!-- Label + Icon row -->
  <div class="stat-card-header">
    <span class="stat-card-label">{{ label|default:"Metric" }}</span>
    <div class="stat-card-icon {{ icon_color|default:'teal' }}" aria-hidden="true">
      {% block stat_icon %}
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
        stroke-linejoin="round">
        <path
          d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 013 19.875v-6.75z" />
        <path
          d="M9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V8.625z" />
        <path
          d="M16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V4.125z" />
      </svg>
      {% endblock %}
    </div>
  </div>

  <!-- Value -->
  <div class="stat-value">{{ value|default:"—" }}</div>

  <!-- Trend + period -->
  <div class="flex items-center gap-2" style="margin-top: 4px;">
    <span class="stat-trend {{ trend_dir|default:'flat' }}" aria-label="Trend: {{ trend }}">
      {% if trend_dir == 'up' %}
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
        stroke-linejoin="round" aria-hidden="true">
        <line x1="12" y1="19" x2="12" y2="5" />
        <polyline points="5 12 12 5 19 12" />
      </svg>
      {% elif trend_dir == 'down' %}
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
        stroke-linejoin="round" aria-hidden="true">
        <line x1="12" y1="5" x2="12" y2="19" />
        <polyline points="19 12 12 19 5 12" />
      </svg>
      {% else %}
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
        stroke-linejoin="round" aria-hidden="true">
        <line x1="5" y1="12" x2="19" y2="12" />
      </svg>
      {% endif %}
      {{ trend|default:"No change" }}
    </span>
    <span class="stat-period">{{ period|default:"vs last month" }}</span>
  </div>

</div>
